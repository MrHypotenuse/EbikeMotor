<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Streetster Sound</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='7' fill='%23080808' stroke='%23FF3800' stroke-width='1.5'/%3E%3Ccircle cx='8' cy='8' r='1.6' fill='%23FF3800'/%3E%3C/svg%3E">
<meta name="description" content="Turn your phone into a synthesized e-bike / motorcycle engine — rev it with real motion or by holding the dial.">
<meta name="theme-color" content="#060608">
<meta name="color-scheme" content="dark">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Streetster">
<meta name="format-detection" content="telephone=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="ambient-glow" id="ambientGlow"></div>

<div class="version" id="version">v2.0.2</div>

<div class="header">
  <div class="brand">Evoque</div>
  <div class="title">Street<span>ster</span> Sound</div>
</div>

<div class="tacho-wrap" id="tachoWrap">
  <div class="tacho-glass" id="tachoGlass"></div>
  <svg class="tacho-svg" viewBox="0 0 270 270" id="svg" aria-hidden="true">
    <defs>
      <!-- Gradient for the main arc fill -->
      <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#CC4400"/>
        <stop offset="50%" stop-color="#FF3800"/>
        <stop offset="100%" stop-color="#FF6B35"/>
      </linearGradient>
      <!-- Glow filter for the needle -->
      <filter id="needleGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
      <!-- Stronger glow for redline -->
      <filter id="needleGlowHot" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
      <!-- Soft glow for the arc -->
      <filter id="arcGlow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
      </filter>
    </defs>

    <!-- Tick marks + labels (drawn by JS) -->
    <g id="tickGroup"></g>

    <!-- Track (background ring) -->
    <path d="M 35 215 A 110 110 0 1 1 235 215"
      fill="none" stroke="#141414" stroke-width="16" stroke-linecap="round"/>

    <!-- Arc glow (behind main arc) -->
    <path id="arcGlowPath" d="" fill="none" stroke="#FF3800" stroke-width="22"
      stroke-linecap="round" opacity="0.15" filter="url(#arcGlow)"/>

    <!-- Fill arc -->
    <path id="arcFill" d="" fill="none" stroke="url(#arcGrad)" stroke-width="16" stroke-linecap="round"/>

    <!-- Redline overlay -->
    <path id="arcRed" d="" fill="none" stroke="#FF0000" stroke-width="16"
      stroke-linecap="round" opacity="0"/>

    <!-- Needle -->
    <line id="needle"
      x1="135" y1="135" x2="135" y2="48"
      stroke="#FF3800" stroke-width="3" stroke-linecap="round"
      transform="rotate(-140, 135, 135)" filter="url(#needleGlow)"/>

    <!-- Hub ring -->
    <circle cx="135" cy="135" r="11" fill="none" stroke="#222" stroke-width="1"/>
    <circle cx="135" cy="135" r="8" fill="#FF3800"/>
    <circle cx="135" cy="135" r="4" fill="#080808"/>
    <circle cx="135" cy="135" r="1.5" fill="#FF3800" opacity="0.6"/>
  </svg>
  <div class="rpm-center">
    <div class="rpm-num" id="rpmNum">0</div>
    <div class="rpm-unit">RPM</div>
    <div class="state-label" id="stLbl">OFF</div>
  </div>
</div>

<div class="status-row">
  <div class="pip" id="pip1"></div>
  <span id="stText">Engine off — tap Start</span>
  <div class="pip" id="pip2"></div>
</div>

<div class="controls-wrap">
  <div class="profiles">
    <button class="prof-btn sel" id="p-inline6"   onclick="setProf('inline6')">Inline-6</button>
    <button class="prof-btn"     id="p-vtwin"     onclick="setProf('vtwin')">V-Twin</button>
    <button class="prof-btn"     id="p-twostroke" onclick="setProf('twostroke')">2-Stroke</button>
    <button class="prof-btn"     id="p-sport"     onclick="setProf('sport')">Sport</button>
    <button class="prof-btn"     id="p-electric"  onclick="setProf('electric')">Electric</button>
  </div>
  <button class="start-btn" id="startBtn" onclick="toggleEngine()">Start Engine</button>
  <div class="hint" id="hint">Tap Start — allow motion on mobile, or hold the dial to rev</div>
</div>

<!-- Plain (non-module) scripts share one global scope, so the inline onclick
     handlers above keep working. Load order: refs → data → systems → boot. -->
<script src="js/dom.js"></script>
<script src="js/profiles.js"></script>
<script src="js/audio.js"></script>
<script src="js/input.js"></script>
<script src="js/ui.js"></script>
<script src="js/engine.js"></script>
<script src="js/main.js"></script>
</body>
</html>
