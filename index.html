<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Streetster Sound</title>
<meta name="description" content="Turn your phone into a synthesized e-bike / motorcycle engine — rev it with real motion or by holding the dial.">
<meta name="theme-color" content="#080808">
<meta name="color-scheme" content="dark">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Streetster">
<meta name="format-detection" content="telephone=no">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  background: #080808;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: max(36px, env(safe-area-inset-top)) 24px max(40px, env(safe-area-inset-bottom));
  overflow: hidden;
  user-select: none;
}
.header { text-align: center; }
.brand { font-size: 10px; letter-spacing: 0.35em; color: #555; text-transform: uppercase; }
.title { font-size: 22px; font-weight: 800; letter-spacing: 0.04em; margin-top: 2px; }
.title span { color: #FF3800; }

/* Tachometer */
.tacho-wrap { position: relative; width: 270px; height: 270px; touch-action: none; cursor: pointer; }
.tacho-svg { width: 100%; height: 100%; }
.rpm-center {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%); text-align: center;
  pointer-events: none;
}
.rpm-num {
  font-size: 56px; font-weight: 900; line-height: 1;
  font-variant-numeric: tabular-nums; letter-spacing: -0.02em;
}
.rpm-unit { font-size: 10px; color: #555; letter-spacing: 0.3em; text-transform: uppercase; margin-top: 2px; }
.state-label { font-size: 11px; color: #444; letter-spacing: 0.2em; text-transform: uppercase; margin-top: 6px; }

/* Status row */
.status-row {
  display: flex; align-items: center; gap: 10px;
  font-size: 12px; color: #555; letter-spacing: 0.12em; text-transform: uppercase;
}
.pip { width: 7px; height: 7px; border-radius: 50%; background: #1E1E1E; transition: all 0.4s; }
.pip.live { background: #FF3800; box-shadow: 0 0 10px #FF3800aa; }

/* Profile selector */
.profiles { display: flex; gap: 8px; width: 100%; }
.prof-btn {
  flex: 1; height: 42px; border-radius: 10px;
  border: 1.5px solid #1C1C1C; background: transparent;
  color: #555; font-size: 11px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer;
  transition: all 0.2s;
}
.prof-btn.sel { border-color: #FF3800; color: #FF3800; background: rgba(255,56,0,0.07); }

/* Start button */
.start-btn {
  width: 100%; height: 62px; border-radius: 14px;
  border: none; font-size: 15px; font-weight: 800;
  letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer;
  transition: all 0.18s; background: #FF3800; color: #fff;
  margin-top: 10px;
}
.start-btn:active { transform: scale(0.97); opacity: 0.88; }
.start-btn.on { background: #111; color: #FF3800; border: 1.5px solid #FF3800; }

.hint {
  font-size: 11px; color: #3A3A3A; text-align: center;
  margin-top: 10px; line-height: 1.6; min-height: 32px;
}
</style>
</head>
<body>

<div class="header">
  <div class="brand">Evoque</div>
  <div class="title">Street<span>ster</span> Sound</div>
</div>

<div class="tacho-wrap" id="tachoWrap">
  <svg class="tacho-svg" viewBox="0 0 270 270" id="svg" aria-hidden="true">
    <!-- Track -->
    <path d="M 35 215 A 110 110 0 1 1 235 215"
      fill="none" stroke="#141414" stroke-width="18" stroke-linecap="round"/>
    <!-- Fill arc -->
    <path id="arcFill" d="" fill="none" stroke="#FF3800" stroke-width="18" stroke-linecap="round"/>
    <!-- Redline overlay -->
    <path id="arcRed" d="" fill="none" stroke="#FF0000" stroke-width="18" stroke-linecap="round" opacity="0"/>
    <!-- Needle -->
    <line id="needle"
      x1="135" y1="135" x2="135" y2="46"
      stroke="#FF3800" stroke-width="3.5" stroke-linecap="round"
      transform="rotate(-140, 135, 135)"/>
    <!-- Hub -->
    <circle cx="135" cy="135" r="9" fill="#FF3800"/>
    <circle cx="135" cy="135" r="4.5" fill="#080808"/>
  </svg>
  <div class="rpm-center">
    <div class="rpm-num" id="rpmNum">0</div>
    <div class="rpm-unit">RPM</div>
    <div class="state-label" id="stLbl">OFF</div>
  </div>
</div>

<div class="status-row">
  <div class="pip" id="pip1"></div>
  <span id="stText">Engine off — tap Start</span>
  <div class="pip" id="pip2"></div>
</div>

<div style="width:100%">
  <div class="profiles">
    <button class="prof-btn sel" id="p-sport"   onclick="setProf('sport')">Sport</button>
    <button class="prof-btn"     id="p-vtwin"   onclick="setProf('vtwin')">V-Twin</button>
    <button class="prof-btn"     id="p-electric" onclick="setProf('electric')">Electric</button>
  </div>
  <button class="start-btn" id="startBtn" onclick="toggleEngine()">Start Engine</button>
  <div class="hint" id="hint">Tap Start — allow motion on mobile, or hold the dial / press Space to rev</div>
</div>

<script>
// ── DOM refs (cached — drawTacho/syncUI run every frame) ─────────────────────────
const $ = id => document.getElementById(id);
const el = {
  rpmNum: $('rpmNum'), stLbl: $('stLbl'), stText: $('stText'),
  pip1: $('pip1'), pip2: $('pip2'), hint: $('hint'),
  startBtn: $('startBtn'), needle: $('needle'),
  arcFill: $('arcFill'), arcRed: $('arcRed'), tacho: $('tachoWrap'),
};

// ── Profiles ───────────────────────────────────────────────────────────────────
const PROFS = {
  // Inline-4 superbike: smooth, bright, screams to redline. Fast even firing.
  sport: {
    idle: 1400, max: 12000,
    harmonics:     [1,    2,    3,    4,    5,    6   ],
    gains:         [0.40, 0.30, 0.24, 0.18, 0.12, 0.07],
    noise: 0.03, filterBase: 1100, drive: 1.25,
    fireMul: 2.0, firePulse: 0.16, subMul: 0.5, subLevel: 0.12, bodyHz: 240,
    hzFn: rpm => rpm / 60 * 2.0,
  },
  // V-twin cruiser: real recorded Harley loop, pitch-shifted by RPM.
  // (Synth params kept as a fallback if the sample fails to load.)
  vtwin: {
    idle: 750, max: 5500,
    sample: 'vtwin.mp3', sampleRpm: 1000, sampleGain: 1.7, samplePitch: 0.7,
    harmonics:     [1,    2,    3,    4   ],
    gains:         [0.75, 0.45, 0.22, 0.09],
    noise: 0.10, filterBase: 520, drive: 1.6,
    fireMul: 0.85, firePulse: 0.85, subMul: 0.5, subLevel: 0.35, bodyHz: 90,
    hzFn: rpm => rpm / 60 * 1.0,
  },
  // Electric: clean high whine, no combustion pulse, rises smoothly. Upper-harmonic heavy.
  electric: {
    idle: 200, max: 9000,
    harmonics:     [1,    2,    4,    6   ],
    gains:         [0.05, 0.30, 0.45, 0.16],
    noise: 0.004, filterBase: 3200, drive: 0.55,
    fireMul: 6.0, firePulse: 0.03, subMul: 1.0, subLevel: 0.03, bodyHz: 700,
    hzFn: rpm => rpm / 60 * 4.0,
  },
};

let profKey = 'sport';
function setProf(k) {
  profKey = k;
  document.querySelectorAll('.prof-btn').forEach(b => b.classList.remove('sel'));
  $('p-' + k).classList.add('sel');
  if (running) rebuildOscs();
}

// ── Audio ──────────────────────────────────────────────────────────────────────
let ctx, master, filt, noiseGain, noiseSource, oscBus, shaper, fireLFO, fireDepth, sub, subGain, formant, formantGain;
let oscs = [];

// Sample playback: preload the raw bytes now; decode once the AudioContext exists.
const BUFFERS = {};
const sampleBytes = {};
['vtwin.mp3'].forEach(url => {
  fetch(url).then(r => r.ok ? r.arrayBuffer() : Promise.reject(r.status))
    .then(ab => { sampleBytes[url] = ab; if (ctx) decodeSample(url); })
    .catch(() => {}); // fall back to synth if the file can't be fetched
});
function decodeSample(url) {
  if (!sampleBytes[url] || BUFFERS[url]) return;
  ctx.decodeAudioData(sampleBytes[url].slice(0)).then(b => {
    BUFFERS[url] = b;
    // If we're already running this profile on the synth fallback, swap to the sample.
    if (running && PROFS[profKey].sample === url) rebuildOscs();
  }).catch(() => {});
}
let running = false, engState = 'off';
let curRPM = 0, targRPM = 0, raf = null;

function makeDriveCurve(k) {
  const n = 1024, c = new Float32Array(n);
  for (let i = 0; i < n; i++) { const x = i / (n - 1) * 2 - 1; c[i] = Math.tanh(k * x); }
  return c;
}

function initAudio() {
  ctx = new (window.AudioContext || window.webkitAudioContext)();
  master = ctx.createGain(); master.gain.value = 0; master.connect(ctx.destination);
  // Resonant lowpass — the Q peak acts like a throaty formant instead of a flat tone.
  filt = ctx.createBiquadFilter(); filt.type = 'lowpass'; filt.frequency.value = 700; filt.Q.value = 3.5;
  filt.connect(master);
  // Soft-clip distortion gives the oscillators grit/rasp instead of a pure synth tone.
  shaper = ctx.createWaveShaper(); shaper.curve = makeDriveCurve(3.2); shaper.oversample = '4x';
  shaper.connect(filt);
  // Parallel high-Q bandpass = the exhaust/pipe resonance ("body") that makes it growl.
  formant = ctx.createBiquadFilter(); formant.type = 'bandpass'; formant.frequency.value = 120; formant.Q.value = 5;
  formantGain = ctx.createGain(); formantGain.gain.value = 0.6;
  shaper.connect(formant); formant.connect(formantGain); formantGain.connect(master);
  oscBus = ctx.createGain(); oscBus.gain.value = 1; oscBus.connect(shaper);
  noiseGain = ctx.createGain(); noiseGain.gain.value = 0; noiseGain.connect(filt);
  // Looping noise buffer
  const N = ctx.sampleRate * 3;
  const buf = ctx.createBuffer(1, N, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < N; i++) d[i] = Math.random() * 2 - 1;
  noiseSource = ctx.createBufferSource();
  noiseSource.buffer = buf; noiseSource.loop = true;
  noiseSource.connect(noiseGain); noiseSource.start();

  // Firing-pulse tremolo: modulates the oscillator bus at the cylinder-firing rate,
  // giving the rhythmic chug/"potato" instead of a flat tone. Adds to oscBus.gain (base 1).
  fireLFO = ctx.createOscillator(); fireLFO.type = 'sawtooth'; fireLFO.frequency.value = 20;
  fireDepth = ctx.createGain(); fireDepth.gain.value = 0;
  fireLFO.connect(fireDepth); fireDepth.connect(oscBus.gain); fireLFO.start();

  // Sub-octave sine for low-end body/thump (shines through car speakers).
  sub = ctx.createOscillator(); sub.type = 'sine'; sub.frequency.value = 30;
  subGain = ctx.createGain(); subGain.gain.value = 0;
  sub.connect(subGain); subGain.connect(filt); sub.start();

  // Decode any samples whose bytes already arrived.
  Object.keys(sampleBytes).forEach(decodeSample);
}

function rebuildOscs() {
  oscs.forEach(o => { try { (o.osc || o.src).stop(); } catch(_){} });
  oscs = [];
  const p = PROFS[profKey];

  // Sample-based profile: loop the recording, pitch it with playbackRate (clean path).
  if (p.sample && BUFFERS[p.sample]) {
    const src = ctx.createBufferSource();
    src.buffer = BUFFERS[p.sample];
    src.loop = true;
    const g = ctx.createGain(); g.gain.value = p.sampleGain || 1;
    src.connect(g); g.connect(master);
    src.start();
    oscs.push({ src, gain: g, isSample: true });
    return;
  }

  p.harmonics.forEach((h, i) => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.value = p.hzFn(p.idle) * h;
    osc.detune.value = (Math.random() * 2 - 1) * 9; // slight detune → beating/growl
    g.gain.value = p.gains[i] * 0.28;
    osc.connect(g); g.connect(oscBus); osc.start();
    oscs.push({ osc, gain: g, h, baseGain: p.gains[i] });
  });
}

function applySound(rpm) {
  if (!ctx || oscs.length === 0) return;
  const p = PROFS[profKey];
  const hz = p.hzFn(rpm);
  const norm = Math.max(0, (rpm - p.idle) / (p.max - p.idle));
  const t = ctx.currentTime;

  // Overall loudness rises with revs/speed (quiet at idle, full at redline).
  master.gain.setTargetAtTime(0.42 + norm * 0.48, t, 0.08);

  // Sample profile: pitch the loop with RPM (samplePitch shifts the whole thing deeper),
  // plus a sub-octave sine underneath for extra low-end chest. Other synth layers stay off.
  if (oscs[0].isSample) {
    const rate = Math.min(2.6, Math.max(0.4, rpm / p.sampleRpm * (p.samplePitch || 1)));
    oscs[0].src.playbackRate.setTargetAtTime(rate, t, 0.07);
    noiseGain.gain.setTargetAtTime(0, t, 0.05);
    fireDepth.gain.setTargetAtTime(0, t, 0.05);
    sub.frequency.setTargetAtTime(34 + norm * 40, t, 0.06);
    subGain.gain.setTargetAtTime(0.35 + norm * 0.25, t, 0.06);
    return;
  }

  oscs.forEach(({ osc, gain, h, baseGain }) => {
    osc.frequency.setTargetAtTime(hz * h, t, 0.04);
    const hiBoost = h > 2 ? 0.4 + norm * 0.9 : 1;
    gain.gain.setTargetAtTime(baseGain * hiBoost * 0.28, t, 0.05);
  });
  filt.frequency.setTargetAtTime(p.filterBase + norm * 3200, t, 0.1);
  noiseGain.gain.setTargetAtTime(p.noise * (0.4 + norm * 0.9), t, 0.06);

  // Drive harder into the soft-clip as you rev → more grit/aggression up top.
  // Per-profile drive keeps Electric clean while V-Twin/Sport get gritty.
  oscBus.gain.setTargetAtTime(p.drive * (0.8 + norm * 0.8), t, 0.05);
  // Exhaust resonance opens up slightly with RPM.
  formant.frequency.setTargetAtTime(p.bodyHz + norm * 140, t, 0.1);

  // Firing pulses: rate climbs with RPM, depth eases off, plus per-update jitter so
  // combustion sounds organic/irregular rather than a sterile tone.
  const jitter = 0.95 + Math.random() * 0.1;
  fireLFO.frequency.setTargetAtTime(Math.max(4, rpm / 60 * p.fireMul * jitter), t, 0.02);
  fireDepth.gain.setTargetAtTime(p.firePulse * (1 - norm * 0.5) * jitter, t, 0.04);
  // Sub-octave body/thump.
  sub.frequency.setTargetAtTime(hz * p.subMul, t, 0.04);
  subGain.gain.setTargetAtTime(p.subLevel * (0.7 + norm * 0.5), t, 0.06);
}

// ── Input: motion (mobile) + manual throttle (desktop / no accelerometer) ────────
let pseudoV = 0, lastT = Date.now(), motionSeen = false, throttle = false;

function onMotion(e) {
  const a = e.acceleration || e.accelerationIncludingGravity;
  if (!a) return;
  motionSeen = true;
  const now = Date.now();
  const dt = Math.min((now - lastT) / 1000, 0.1); lastT = now;
  const mag = Math.sqrt((a.x||0)**2 + (a.y||0)**2);
  if (mag > 0.4) pseudoV += mag * dt * 9;
  pseudoV *= Math.pow(0.90, dt * 60);
  pseudoV = Math.max(0, Math.min(100, pseudoV));
}

// Returns 'granted' | 'denied' | 'insecure' | 'none'
async function askMotion() {
  // Motion sensors only work on a secure origin (https:// or localhost).
  if (!window.isSecureContext) return 'insecure';

  // iOS 13+ : must request permission from a user gesture (the Start tap).
  if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
    try {
      const r = await DeviceMotionEvent.requestPermission();
      if (r === 'granted') { window.addEventListener('devicemotion', onMotion); return 'granted'; }
      return 'denied';
    } catch { return 'denied'; }
  }

  // Android / other: devicemotion fires without a prompt when a sensor exists.
  if (typeof DeviceMotionEvent !== 'undefined') {
    window.addEventListener('devicemotion', onMotion);
    return 'granted';
  }
  return 'none'; // no motion API (desktop) — manual throttle only
}

function setThrottle(on) { throttle = on; }

// ── Engine State ───────────────────────────────────────────────────────────────
async function toggleEngine() {
  if (engState === 'off' || engState === 'stopping') await startUp();
  else shutDown();
}

async function startUp() {
  // Request motion permission FIRST, while the tap's user activation is still alive.
  // Awaiting ctx.resume() before this makes iOS drop the gesture and skip the prompt
  // until a second tap — so order matters here.
  const motion = await askMotion();
  if (!ctx) initAudio();
  if (ctx.state === 'suspended') await ctx.resume();
  const MOTION_MSG = {
    granted:  'Motion active — accelerate to rev!',
    denied:   'Motion blocked — enable Settings ▸ Safari ▸ Motion & Orientation Access, then reload',
    insecure: 'Open the https:// link (motion needs a secure site) — hold the dial / press Space for now',
    none:     'No accelerometer here — hold the dial or press Space to rev',
  };

  engState = 'starting'; running = true; syncUI();
  rebuildOscs();

  const p = PROFS[profKey];
  const t0 = ctx.currentTime;
  // Crank: ramp from 0 to idle-overshoot then settle
  master.gain.setValueAtTime(0, t0);
  master.gain.linearRampToValueAtTime(0.7, t0 + 0.25);

  oscs.forEach(o => {
    if (o.isSample) {
      // Crank: spin the recording up from a slow rate to the (deeper) idle pitch.
      const idleRate = p.idle / p.sampleRpm * (p.samplePitch || 1);
      o.src.playbackRate.setValueAtTime(0.3, t0);
      o.src.playbackRate.linearRampToValueAtTime(idleRate * 1.4, t0 + 0.7);
      o.src.playbackRate.linearRampToValueAtTime(idleRate, t0 + 1.5);
      return;
    }
    const { osc, h } = o;
    osc.frequency.setValueAtTime(p.hzFn(120) * h, t0);
    osc.frequency.linearRampToValueAtTime(p.hzFn(p.idle * 1.45) * h, t0 + 0.7);
    osc.frequency.linearRampToValueAtTime(p.hzFn(p.idle) * h, t0 + 1.5);
  });
  curRPM = 120; targRPM = p.idle;

  el.startBtn.textContent = 'Stop Engine';
  el.startBtn.classList.add('on');
  setHint(MOTION_MSG[motion]);

  setTimeout(() => { engState = 'idle'; syncUI(); loop(); }, 1700);
}

function shutDown() {
  engState = 'stopping'; syncUI();
  if (raf) cancelAnimationFrame(raf); raf = null;
  window.removeEventListener('devicemotion', onMotion);
  throttle = false;

  const p = PROFS[profKey];
  const t = ctx.currentTime;
  oscs.forEach(o => {
    if (o.isSample) {
      o.src.playbackRate.cancelScheduledValues(t);
      o.src.playbackRate.setValueAtTime(o.src.playbackRate.value, t);
      o.src.playbackRate.linearRampToValueAtTime(0.4, t + 0.7);
      return;
    }
    const { osc, h } = o;
    osc.frequency.cancelScheduledValues(t);
    osc.frequency.setValueAtTime(osc.frequency.value, t);
    osc.frequency.linearRampToValueAtTime(p.hzFn(p.idle * 0.4) * h, t + 0.7);
  });
  master.gain.cancelScheduledValues(t);
  master.gain.setValueAtTime(master.gain.value, t);
  master.gain.linearRampToValueAtTime(0, t + 0.9);

  el.startBtn.textContent = 'Start Engine';
  el.startBtn.classList.remove('on');
  setHint('Tap Start — allow motion on mobile, or hold the dial / press Space to rev');

  setTimeout(() => {
    engState = 'off'; running = false; curRPM = 0; pseudoV = 0;
    // Free sources while silent (saves battery); startUp rebuilds them.
    oscs.forEach(o => { try { (o.osc || o.src).stop(); } catch(_){} });
    oscs = [];
    syncUI(); drawTacho(0);
  }, 1000);
}

function loop() {
  if (!running) return;
  const p = PROFS[profKey];
  // Manual throttle drives pseudoV when there's no live accelerometer.
  if (throttle) pseudoV = Math.min(100, pseudoV + 2.4);
  else if (!motionSeen) pseudoV = Math.max(0, pseudoV * 0.94 - 0.3);
  targRPM = p.idle + (pseudoV / 100) * (p.max - p.idle);
  // Higher factor = snappier throttle response (less lag between motion and revs).
  curRPM += (targRPM - curRPM) * 0.18;
  curRPM = Math.max(p.idle * 0.94, Math.min(p.max, curRPM));
  if (curRPM > p.idle * 1.05) engState = 'running';
  else if (running) engState = 'idle';
  applySound(curRPM);
  drawTacho(curRPM);
  raf = requestAnimationFrame(loop);
}

// ── UI ─────────────────────────────────────────────────────────────────────────
const LABELS = { off:'OFF', starting:'CRANKING', idle:'IDLE', running:'RUNNING', stopping:'STOPPING' };
const TEXTS  = { off:'Engine off — tap Start', starting:'Cranking...', idle:'Idling — accelerate to rev', running:'Running', stopping:'Shutting down...' };

function syncUI() {
  el.stLbl.textContent = LABELS[engState] || '';
  el.stText.textContent = TEXTS[engState] || '';
  const live = engState !== 'off';
  el.pip1.classList.toggle('live', live);
  el.pip2.classList.toggle('live', live);
}

function setHint(t) { el.hint.textContent = t; }

// ── Tachometer Drawing ─────────────────────────────────────────────────────────
const CX = 135, CY = 135, R = 110;
const ARC_START = -230; // degrees from top
const ARC_SWEEP = 280;

function polar(deg) {
  const rad = (deg - 90) * Math.PI / 180;
  return [CX + R * Math.cos(rad), CY + R * Math.sin(rad)];
}

function arcPath(norm) {
  if (norm < 0.002) return '';
  const n = Math.min(norm, 1);
  const [sx, sy] = polar(ARC_START);
  const [ex, ey] = polar(ARC_START + ARC_SWEEP * n);
  const large = ARC_SWEEP * n > 180 ? 1 : 0;
  return `M ${sx} ${sy} A ${R} ${R} 0 ${large} 1 ${ex} ${ey}`;
}

function drawTacho(rpm) {
  const p = PROFS[profKey];
  const norm = Math.min(rpm / p.max, 1);

  el.rpmNum.textContent = Math.round(rpm / 10) * 10;

  // Needle angle: -140deg at 0, +140deg at max
  const ang = -140 + norm * 280;
  el.needle.setAttribute('transform', `rotate(${ang}, ${CX}, ${CY})`);

  const REDLINE = 0.78;
  if (norm > REDLINE) {
    el.arcFill.setAttribute('d', arcPath(REDLINE));
    // Redline arc
    const [rsx, rsy] = polar(ARC_START + ARC_SWEEP * REDLINE);
    const [rex, rey] = polar(ARC_START + ARC_SWEEP * norm);
    const rl = ARC_SWEEP * (norm - REDLINE) > 180 ? 1 : 0;
    el.arcRed.setAttribute('d', `M ${rsx} ${rsy} A ${R} ${R} 0 ${rl} 1 ${rex} ${rey}`);
    el.arcRed.style.opacity = '1';
    el.needle.setAttribute('stroke', '#FF0000');
  } else {
    el.arcFill.setAttribute('d', arcPath(norm));
    el.arcRed.style.opacity = '0';
    el.needle.setAttribute('stroke', '#FF3800');
  }
}

// ── Manual throttle bindings (hold the dial / press Space) ───────────────────────
el.tacho.addEventListener('pointerdown', e => { e.preventDefault(); setThrottle(true); });
['pointerup', 'pointercancel', 'pointerleave'].forEach(ev =>
  el.tacho.addEventListener(ev, () => setThrottle(false)));
window.addEventListener('keydown', e => {
  if (e.code === 'Space' && !e.repeat) { e.preventDefault(); setThrottle(true); }
});
window.addEventListener('keyup', e => { if (e.code === 'Space') setThrottle(false); });

// init
drawTacho(0); syncUI();
</script>
</body>
</html>
